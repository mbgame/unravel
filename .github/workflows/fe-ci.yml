name: Frontend CI

on:
  pull_request:
    branches:
      - main
    paths:
      - 'apps/frontend/**'
      - 'packages/shared-types/**'
      - 'pnpm-lock.yaml'

concurrency:
  group: fe-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-test:
    name: Lint, Type-check & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared-types
        run: pnpm --filter @unravel/shared-types build || true

      - name: Lint
        run: pnpm --filter @unravel/frontend lint

      - name: Type-check
        run: pnpm --filter @unravel/frontend type-check

      - name: Run tests
        run: pnpm --filter @unravel/frontend test --run
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
          NEXT_PUBLIC_APP_URL: http://localhost:3000
