name: Backend CI

on:
  pull_request:
    branches:
      - main
    paths:
      - 'apps/backend/**'
      - 'packages/shared-types/**'
      - 'pnpm-lock.yaml'

concurrency:
  group: be-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-test:
    name: Lint, Type-check & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: unravel_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared-types
        run: pnpm --filter @unravel/shared-types build || true

      - name: Lint
        run: pnpm --filter @unravel/backend lint

      - name: Type-check
        run: pnpm --filter @unravel/backend type-check

      - name: Run unit tests
        run: pnpm --filter @unravel/backend test
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/unravel_test
          JWT_SECRET: ci-test-secret-at-least-32-characters-long
          JWT_REFRESH_SECRET: ci-test-refresh-secret-at-least-32-characters
          JWT_EXPIRES_IN: 15m
          JWT_REFRESH_EXPIRES_IN: 7d
          PORT: 3001
          CORS_ORIGIN: http://localhost:3000

      - name: Run e2e tests
        run: pnpm --filter @unravel/backend test:e2e
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/unravel_test
          JWT_SECRET: ci-test-secret-at-least-32-characters-long
          JWT_REFRESH_SECRET: ci-test-refresh-secret-at-least-32-characters
          JWT_EXPIRES_IN: 15m
          JWT_REFRESH_EXPIRES_IN: 7d
          PORT: 3001
          CORS_ORIGIN: http://localhost:3000
